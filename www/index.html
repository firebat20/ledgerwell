<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LedgerWell — personal finance ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="app">
  <aside id="side"></aside>
  <main id="main"></main>
</div>
<div id="modal-root"></div>

<!-- Plain (non-module) scripts so the app also runs from a file:// open -->
<script src="src/storage.js"></script>
<script src="src/engine.js"></script>
<script src="src/ui.js"></script>
<script src="src/investments.js"></script>
<script src="src/import.js"></script>
<script src="src/backup.js"></script>
<script src="src/price-provider.js"></script>
<script src="src/price-store.js"></script>
<script src="src/price-fetch.js"></script>
<script src="src/price-bulk.js"></script>
<script src="src/price-splits.js"></script>
<script src="src/charts.js"></script>
<script>
  (async function init() {
    await load();
    try { await hydratePricesFromStore(); } catch (e) { console.error(e); }
    render();
    try { if (typeof maybeAutoRefreshPrices === "function") await maybeAutoRefreshPrices(); }
    catch (e) { console.error(e); }
  })();
</script>
</body>
</html>
